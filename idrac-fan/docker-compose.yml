# Source: https://github.com/tigerblue77/Dell_iDRAC_fan_controller_Docker
version: '3.8'

services:
  idrac-fan:
    image: tigerblue77/dell_idrac_fan_controller:latest
    container_name: idrac-fan
    restart: unless-stopped
    environment:
      - IDRAC_HOST=${IP_ADDRESS}
      - IDRAC_USERNAME=${USERNAME}
      - IDRAC_PASSWORD=${PASSWORD}
      - FAN_SPEED=0x10 #10%
      - CPU_TEMPERATURE_THRESHOLD=65
      #- CHECK_INTERVAL=
      #- DISABLE_THIRD_PARTY_PCIE_CARD_DELL_DEFAULT_COOLING_RESPONSE=<true or false>
      #- KEEP_THIRD_PARTY_PCIE_CARD_COOLING_RESPONSE_STATE_ON_EXIT=<true or false>
